<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#111318" />
<meta name="description" content="PUSH · PULL · LEGS · UPPER · LOWER 5분할 운동 기록 앱" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="운동관리" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
<title>운동관리</title>
<style>
:root{
  --bg:#111318;
  --surface:#1a1d24;
  --surface2:#232731;
  --border:#343946;
  --text:#f5f6f8;
  --muted:#949ba8;
  --accent:#4f8edc;
  --accent2:#2e5f9b;
  --success:#51a766;
  --warn:#d9a441;
  --danger:#d66557;
  --shadow:0 12px 30px rgba(0,0,0,.25);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif}
body{min-height:100vh;padding-bottom:calc(28px + env(safe-area-inset-bottom))}
button,input{font:inherit}
button{touch-action:manipulation}
#app{width:100%;max-width:520px;margin:0 auto;padding:0 14px}

.topbar{position:sticky;top:0;z-index:30;background:rgba(17,19,24,.96);backdrop-filter:blur(14px);padding-top:calc(10px + env(safe-area-inset-top));border-bottom:1px solid var(--border)}
.topline{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 2px 9px}
.brand{font-size:13px;font-weight:800;letter-spacing:.06em;color:var(--muted)}
.small-actions{display:flex;gap:6px}
.icon-btn{min-width:42px;height:36px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:12px;font-weight:800;padding:0 10px}
.tabs{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:5px;padding:0 0 10px}
.tab{min-width:0;min-height:40px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--muted);padding:0 3px;font-size:11px;font-weight:900}
.tab.active{background:var(--accent);border-color:var(--accent);color:white}

.page{padding-top:13px}
.progress-row{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px;color:var(--muted);font-size:12px}
.progress-row b{color:var(--text)}
.progress-track{height:5px;border-radius:999px;background:var(--surface2);overflow:hidden;margin:0 2px 12px}
.progress-fill{height:100%;background:var(--success);transition:width .2s ease}
.exercise-dots{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:0 1px 11px}
.exercise-dots::-webkit-scrollbar{display:none}
.dot{flex:0 0 32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:900}
.dot.current{border-color:var(--accent);background:var(--accent2);color:white}
.dot.done{border-color:var(--success);background:rgba(81,167,102,.18);color:#8cdda0}

.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.card.done{border-color:var(--success)}
.card-head{padding:16px 16px 13px;border-bottom:1px solid var(--border)}
.counter{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.05em}
.title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-top:5px}
.ex-title{font-size:21px;line-height:1.28;font-weight:900;letter-spacing:-.03em}
.badge{flex:0 0 auto;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:900;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.target{font-size:13px;color:var(--muted);margin-top:7px}
.target b{color:var(--text)}
.card-body{padding:14px 16px 16px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.info-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 11px;min-height:66px}
.info-label{font-size:10px;color:var(--muted);font-weight:800;margin-bottom:5px}
.info-value{font-size:13px;font-weight:800;line-height:1.35;word-break:keep-all}
.info-value.good{color:#8cdda0}.info-value.warn{color:#f0c46c}
.recent-strip{font-size:11px;color:var(--muted);line-height:1.55;margin:-2px 2px 12px}
.recent-strip b{color:var(--text)}
.section-label{font-size:11px;color:var(--muted);font-weight:900;letter-spacing:.05em;margin:13px 2px 7px}
.weight-control{display:grid;grid-template-columns:52px 1fr 52px;gap:10px;align-items:center}
.step{height:50px;border-radius:13px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:25px;font-weight:900}
.weight-box{height:62px;border-radius:14px;border:1px solid var(--border);background:#15171d;display:flex;justify-content:center;align-items:baseline;gap:5px}
.weight-box input{width:112px;border:0;outline:0;background:transparent;color:var(--text);font-size:33px;font-weight:900;text-align:center;padding:0}
.weight-box span{font-size:13px;color:var(--muted);font-weight:800}
.helper{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}

.sets{display:grid;gap:8px}
.set-row{display:grid;grid-template-columns:64px 46px 1fr 46px;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:8px}
.set-name{font-size:12px;color:var(--muted);font-weight:900;padding-left:3px}
.rep-step{height:44px;border-radius:11px;border:1px solid var(--border);background:#181b22;color:var(--text);font-size:20px;font-weight:900}
.rep-value{height:44px;border-radius:11px;background:#15171d;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
.rep-value.above{color:#8cdda0}.rep-value.below{color:#f0a191}
.smart-note{border:1px dashed var(--border);border-radius:11px;padding:8px 10px;color:var(--muted);font-size:11px;line-height:1.5;margin-top:9px}
.smart-note b{color:var(--text)}
.save-btn{width:100%;min-height:56px;border:0;border-radius:14px;background:var(--accent);color:white;font-weight:900;font-size:16px;margin-top:14px}
.save-btn.edit{background:var(--success)}
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
.nav-btn{height:46px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:850}
.nav-btn:disabled{opacity:.35}

/* iPhone 운동 중 핵심 조작부: 항상 화면 하단에 고정 */
.page.with-action-dock{padding-bottom:calc(82px + env(safe-area-inset-bottom))}
.action-dock{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:60;
  width:min(520px,100%);padding:8px max(14px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left));
  background:linear-gradient(to top,rgba(17,19,24,1) 72%,rgba(17,19,24,.93));
  border-top:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.action-dock-inner{display:grid;grid-template-columns:72px minmax(0,1fr) 72px;gap:8px;align-items:center}
.dock-nav-btn,.dock-save-btn{height:52px;border-radius:13px;font-weight:900}
.dock-nav-btn{border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px}
.dock-nav-btn:disabled{opacity:.32}
.dock-save-btn{border:0;background:var(--accent);color:#fff;font-size:14px;box-shadow:0 8px 20px rgba(79,142,220,.22)}
.dock-save-btn.edit{background:var(--success);box-shadow:0 8px 20px rgba(81,167,102,.20)}

.done-banner{background:rgba(81,167,102,.13);border:1px solid rgba(81,167,102,.55);border-radius:13px;padding:10px 12px;margin-bottom:12px;color:#a5e7b3;font-size:12px;font-weight:800;line-height:1.45}

.complete-panel{text-align:center;background:var(--surface);border:1px solid var(--success);border-radius:18px;padding:28px 18px;box-shadow:var(--shadow)}
.complete-icon{font-size:34px}.complete-title{font-size:22px;font-weight:900;margin-top:8px}.complete-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-top:7px}
.complete-btn{width:100%;height:52px;border:0;border-radius:13px;background:var(--accent);color:white;font-weight:900;margin-top:16px}

.section-title{font-size:12px;letter-spacing:.05em;color:var(--muted);font-weight:900;margin:18px 2px 8px}
.stat-card,.manage-card{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:13px;margin-bottom:9px}
.stat-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.stat-name{font-size:14px;font-weight:850}.stat-pr{font-size:11px;color:#f0c46c;font-weight:900}
.stat-current{font-size:24px;font-weight:900;margin-top:5px}.stat-current span{font-size:11px;color:var(--muted);margin-left:4px}
.stat-trail{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
.spark{display:block;margin-top:9px;max-width:100%}
.bw-row{display:grid;grid-template-columns:1fr 78px 66px;gap:8px}
.bw-row input{height:44px;border-radius:11px;border:1px solid var(--border);background:#15171d;color:var(--text);text-align:center;font-weight:900;font-size:16px;width:100%}
.small-btn{height:44px;border:1px solid var(--border);border-radius:11px;background:var(--surface2);color:var(--text);font-weight:900;font-size:12px}
.small-btn.primary{background:var(--accent);border-color:var(--accent)}
.small-btn.danger{color:#ffb0a7}
.file-label{display:flex;align-items:center;justify-content:center;height:44px;border:1px solid var(--border);border-radius:11px;background:var(--surface2);color:var(--text);font-weight:900;font-size:12px;cursor:pointer}
.file-label input{display:none}
.manage-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.notice{font-size:11px;color:var(--muted);line-height:1.6;margin-top:9px}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:13px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#f5f6f8;color:#17191f;border-radius:999px;padding:10px 16px;font-size:12px;font-weight:900;box-shadow:var(--shadow);z-index:99;opacity:0;pointer-events:none;transition:.2s}
.toast.show{opacity:1;bottom:calc(96px + env(safe-area-inset-bottom))}
.connection-badge{display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 9px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--muted);font-size:10px;font-weight:900;white-space:nowrap}
.connection-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--success)}
.connection-badge.offline{color:#f0c46c;border-color:rgba(217,164,65,.55)}
.connection-badge.offline::before{background:var(--warn)}
.install-note{background:rgba(79,142,220,.09);border:1px solid rgba(79,142,220,.35);border-radius:12px;padding:10px 11px;color:var(--muted);font-size:11px;line-height:1.55;margin-bottom:10px}
.install-note b{color:var(--text)}
@media(max-width:360px){.tab{padding:0 13px}.ex-title{font-size:19px}.weight-box input{width:94px}.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
const APP_VERSION = '3.1-offline-pwa-fixed-actions';
const KEY = 'jeremy_workout_v3';
const LEGACY_KEYS = ['jeremy_workout_v2'];
const DAYS = ['PUSH','PULL','LEGS','UPPER','LOWER'];

const PROGRAM = {
  PUSH: [
    {id:'db_chest_press', name:'덤벨 체스트프레스', reps:[8,8,8], type:'compound', inc:2.5, note:'덤벨 중량은 한 손 기준'},
    {id:'machine_shoulder_press', name:'머신 숄더프레스', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'db_fly', name:'덤벨 플라이', reps:[10,10,10], type:'isolation', inc:1.25, note:'덤벨 중량은 한 손 기준'},
    {id:'side_lateral', name:'사이드 레터럴 레이즈', reps:[15,15,15], type:'isolation', inc:1, note:'덤벨 중량은 한 손 기준'},
    {id:'oh_tricep_ext', name:'오버헤드 케이블 삼두 익스텐션', reps:[10,10,10], type:'isolation', inc:1.25},
    {id:'pushdown', name:'케이블 푸시다운', reps:[10,10,10], type:'isolation', inc:1.25},
    {id:'leg_raise', name:'레그레이즈', reps:[15,15,15], type:'isolation', inc:0, bodyweight:true}
  ],
  PULL: [
    {id:'latpulldown', name:'랫풀다운', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'chest_supported_row', name:'체스트 서포티드 로우', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'seated_cable_row', name:'시티드 케이블 로우', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'reverse_pecdeck', name:'리버스 펙덱', reps:[15,15,15], type:'isolation', inc:1},
    {id:'arm_pulldown', name:'암풀다운', reps:[10,10,10], type:'isolation', inc:1.25},
    {id:'hammer_curl', name:'해머컬', reps:[10,10,10], type:'isolation', inc:1, note:'덤벨 중량은 한 손 기준'},
    {id:'preacher_curl', name:'머신 프리처컬', reps:[10,10,10], type:'isolation', inc:1}
  ],
  LEGS: [
    {id:'lying_leg_curl', name:'라잉 레그컬', reps:[10,10,10], type:'isolation', inc:1.25},
    {id:'smith_squat_quad', name:'스미스 스쿼트 · 대퇴사두근 중심', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'bulgarian_split', name:'불가리안 스플릿 스쿼트 · 한쪽씩', reps:[8,8,8], type:'compound', inc:1, note:'덤벨 중량은 한 손 기준'},
    {id:'leg_extension', name:'레그 익스텐션', reps:[10,10,10], type:'isolation', inc:1.25},
    {id:'hip_adduction', name:'힙 어덕션', reps:[15,15,15], type:'isolation', inc:1},
    {id:'hip_abduction', name:'힙 어브덕션', reps:[15,15,15], type:'isolation', inc:1},
    {id:'calf_raise', name:'카프레이즈', reps:[15,15,15], type:'isolation', inc:2.5}
  ],
  UPPER: [
    {id:'incline_db_press', name:'인클라인 덤벨프레스', reps:[8,8,8], type:'compound', inc:2.5, note:'덤벨 중량은 한 손 기준'},
    {id:'latpulldown', name:'랫풀다운', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'pecdeck_fly', name:'펙덱 플라이', reps:[10,10,10], type:'isolation', inc:1.25},
    {id:'smith_row', name:'스미스 머신 로우', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'side_lateral_cable', name:'케이블/머신 사이드 레터럴 레이즈', reps:[15,15,15], type:'isolation', inc:1},
    {id:'oh_tricep_ext', name:'오버헤드 케이블 삼두 익스텐션', reps:[10,10,10], type:'isolation', inc:1.25},
    {id:'bayesian_curl', name:'베이지안 케이블 컬 · 대체: 인클라인 덤벨 컬', reps:[10,10,10], type:'isolation', inc:1}
  ],
  LOWER: [
    {id:'kneeling_leg_curl', name:'닐링 레그컬 · 한쪽씩', reps:[10,10,10], type:'isolation', inc:1.25},
    {id:'rdl', name:'루마니안 데드리프트', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'hip_thrust', name:'힙쓰러스트', reps:[10,10,10], type:'compound', inc:2.5},
    {id:'smith_squat_glute', name:'스미스 스쿼트 · 둔근 중심', reps:[8,8,8], type:'compound', inc:2.5},
    {id:'calf_raise', name:'카프레이즈', reps:[15,15,15], type:'isolation', inc:2.5},
    {id:'cable_crunch', name:'케이블 크런치', reps:[15,15,15], type:'isolation', inc:1.25}
  ]
};

const DEFAULT_DATA = {
  version:APP_VERSION,
  state:{lastDay:'PUSH', indexByDay:{PUSH:0,PULL:0,LEGS:0,UPPER:0,LOWER:0}, weights:{}},
  history:{},
  bodyweight:[]
};

let data = loadData();
let view = 'day';
let drafts = {};
let reviewCompleted = false;

function clone(v){return JSON.parse(JSON.stringify(v));}
function todayStr(){
  const d=new Date();
  return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
}
function fmtDate(iso){if(!iso)return '';const p=iso.split('-');return `${Number(p[1])}/${Number(p[2])}`;}
function roundQuarter(v){return Math.round(Number(v)*4)/4;}
function sameWeight(a,b){return a!=null&&b!=null&&Math.abs(Number(a)-Number(b))<.001;}
const memoryStorage = {};
function storageGet(key){
  try{return localStorage.getItem(key);}catch(e){return memoryStorage[key]||null;}
}
function storageSet(key,value){
  try{localStorage.setItem(key,value);return true;}catch(e){memoryStorage[key]=value;return false;}
}
function loadData(){
  try{
    let raw=storageGet(KEY);
    if(!raw){
      for(const legacyKey of LEGACY_KEYS){
        raw=storageGet(legacyKey);
        if(raw){ storageSet(KEY,raw); break; }
      }
    }
    if(!raw)return clone(DEFAULT_DATA);
    const parsed=JSON.parse(raw);
    return {
      version:APP_VERSION,
      state:Object.assign(clone(DEFAULT_DATA.state),parsed.state||{}),
      history:parsed.history||{},
      bodyweight:parsed.bodyweight||[]
    };
  }catch(e){return clone(DEFAULT_DATA);}
}
function saveData(){storageSet(KEY,JSON.stringify(data));}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1500);}

function entries(exId){return data.history[exId]||[];}
function lastEntry(exId){const a=entries(exId);return a.length?a[a.length-1]:null;}
function todayEntry(exId,day){const a=entries(exId);return [...a].reverse().find(e=>e.date===todayStr()&&e.day===day)||null;}
function lastBeforeToday(exId,day){
  const a=entries(exId);
  for(let i=a.length-1;i>=0;i--){
    if(!(a[i].date===todayStr()&&a[i].day===day))return a[i];
  }
  return null;
}
function successOf(ex,reps){return reps.every((r,i)=>Number(r)>=Number(ex.reps[i]));}
function statusOf(ex,reps){
  const success=successOf(ex,reps);
  if(!success)return '유지';
  return reps.some((r,i)=>Number(r)>Number(ex.reps[i]))?'초과 달성':'목표 달성';
}
function latestWeight(ex){
  if(data.state.weights[ex.id]!=null)return data.state.weights[ex.id];
  const last=lastEntry(ex.id);return last?last.weight:null;
}
function recommend(ex,entry){
  if(!entry)return null;
  return entry.success&&ex.inc>0?roundQuarter(entry.weight+ex.inc):entry.weight;
}
function keyFor(day,exId){return `${day}:${exId}`;}
function makeDraft(day,ex){
  const key=keyFor(day,ex.id);
  if(drafts[key])return drafts[key];
  const te=todayEntry(ex.id,day);
  if(te){
    drafts[key]={weight:te.weight,reps:te.reps.slice(),repsTouched:false,editing:true};
    return drafts[key];
  }
  const last=lastBeforeToday(ex.id,day)||lastEntry(ex.id);
  const weight=latestWeight(ex);
  let reps=ex.reps.slice();
  let smart='목표 반복수로 준비됨';
  if(last && sameWeight(weight,last.weight) && !last.success){
    reps=last.reps.slice();
    smart='같은 중량의 직전 미달 반복수를 불러옴';
  }
  drafts[key]={weight:weight,reps,repsTouched:false,editing:false,smart};
  return drafts[key];
}
function resetDraft(day,ex){delete drafts[keyFor(day,ex.id)];return makeDraft(day,ex);}

function setDay(day){data.state.lastDay=day;reviewCompleted=false;saveData();view='day';render();}
function setIndex(day,i){const max=PROGRAM[day].length-1;data.state.indexByDay[day]=Math.max(0,Math.min(max,i));reviewCompleted=true;saveData();render();}
function showStats(){view='stats';render();}
function showDay(){view='day';reviewCompleted=false;render();}

function weightTyping(day,exId,val){
  const ex=PROGRAM[day].find(x=>x.id===exId);if(!ex)return;
  const d=makeDraft(day,ex);d.weight=val===''?null:Math.max(0,roundQuarter(val));
}
function weightChanged(day,exId,val){
  const ex=PROGRAM[day].find(x=>x.id===exId);if(!ex)return;
  const d=makeDraft(day,ex);const n=val===''?null:Math.max(0,roundQuarter(val));
  d.weight=n;
  if(!d.repsTouched){
    const last=lastBeforeToday(ex.id,day)||lastEntry(ex.id);
    if(last&&sameWeight(n,last.weight)&&!last.success){d.reps=last.reps.slice();d.smart='같은 중량의 직전 미달 반복수를 불러옴';}
    else{d.reps=ex.reps.slice();d.smart='중량 변경에 맞춰 목표 반복수로 초기화됨';}
  }
  render();
}
function stepWeight(day,exId,delta){
  const ex=PROGRAM[day].find(x=>x.id===exId);const d=makeDraft(day,ex);
  const base=d.weight==null?0:Number(d.weight);weightChanged(day,exId,base+delta);
}
function stepRep(day,exId,idx,delta){
  const ex=PROGRAM[day].find(x=>x.id===exId);const d=makeDraft(day,ex);
  d.reps[idx]=Math.max(0,Number(d.reps[idx])+delta);d.repsTouched=true;d.smart='실제 반복수로 수정 중';render();
}
function saveExercise(day,exId){
  const ex=PROGRAM[day].find(x=>x.id===exId);const d=makeDraft(day,ex);
  if(!ex.bodyweight && (d.weight==null||d.weight==='')){toast('중량을 먼저 입력하세요');return;}
  const weight=ex.bodyweight?0:Number(d.weight);
  const reps=d.reps.map(Number);const success=successOf(ex,reps);
  const entry={date:todayStr(),day,weight,reps,success,status:statusOf(ex,reps),target:ex.reps.slice()};
  if(!data.history[ex.id])data.history[ex.id]=[];
  const a=data.history[ex.id];
  const idx=a.findIndex(e=>e.date===entry.date&&e.day===day);
  if(idx>=0)a[idx]=entry;else a.push(entry);
  if(a.length>250)a.splice(0,a.length-250);
  data.state.weights[ex.id]=weight;
  saveData();
  drafts[keyFor(day,ex.id)]={weight,reps:reps.slice(),repsTouched:false,editing:true,smart:'오늘 저장된 기록'};
  const list=PROGRAM[day];const current=data.state.indexByDay[day]||0;
  if(current<list.length-1)data.state.indexByDay[day]=current+1;
  saveData();
  toast(idx>=0?'기록을 수정했습니다':'저장했습니다');
  render();
}
function addBodyweight(val){
  const n=parseFloat(val);if(!n||n<30||n>250){toast('체중을 확인하세요');return;}
  const date=todayStr();const idx=data.bodyweight.findIndex(x=>x.date===date);
  if(idx>=0)data.bodyweight[idx].weight=n;else data.bodyweight.push({date,weight:n});
  data.bodyweight.sort((a,b)=>a.date.localeCompare(b.date));if(data.bodyweight.length>365)data.bodyweight.shift();saveData();toast('체중 저장');render();
}

function doneCount(day){return PROGRAM[day].filter(ex=>todayEntry(ex.id,day)).length;}
function allDone(day){return doneCount(day)===PROGRAM[day].length;}
function recentText(exId,n=3){
  const a=entries(exId).slice(-n);if(!a.length)return '최근 기록 없음';
  return a.map(e=>`${fmtDate(e.date)} ${e.weight===0?'체중':e.weight+'kg'} · ${e.reps.join('/')}`).join('  ·  ');
}
function previousText(entry){
  if(!entry)return '기록 없음';
  return `${entry.weight===0?'체중':entry.weight+'kg'} · ${entry.reps.join(' / ')}`;
}
function recommendationText(ex,entry){
  if(!entry)return '첫 기록 후 표시';
  if(ex.bodyweight)return entry.success?'현재 방식 유지':'반복수 유지';
  const rec=recommend(ex,entry);return entry.success?`${rec}kg 권장`:`${entry.weight}kg 유지`;
}

function renderTop(){
  const online = navigator.onLine;
  return `<div class="topbar">
    <div class="topline"><div style="display:flex;align-items:center;gap:8px"><div class="brand">WORKOUT LOG</div><div id="connectionBadge" class="connection-badge ${online?'':'offline'}">${online?'온라인':'오프라인'}</div></div><div class="small-actions"><button class="icon-btn" onclick="showDay()">운동</button><button class="icon-btn" onclick="showStats()">통계</button></div></div>
    <div class="tabs">${DAYS.map(d=>`<button class="tab ${view==='day'&&data.state.lastDay===d?'active':''}" onclick="setDay('${d}')">${d}</button>`).join('')}</div>
  </div>`;
}

function renderDay(){
  const day=data.state.lastDay;const list=PROGRAM[day];const count=doneCount(day);let idx=data.state.indexByDay[day]||0;
  if(idx>=list.length)idx=list.length-1;
  if(allDone(day) && !reviewCompleted){
    return `<main class="page">
      <div class="progress-row"><span>${day}</span><b>${count} / ${list.length} 완료</b></div>
      <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
      <div class="exercise-dots">${list.map((ex,i)=>`<button class="dot done" onclick="setIndex('${day}',${i})">${i+1}</button>`).join('')}</div>
      <div class="complete-panel"><div class="complete-icon">✓</div><div class="complete-title">오늘 ${day} 완료</div><div class="complete-sub">모든 운동이 저장되었습니다.<br>위 번호를 눌러 기록을 다시 확인하거나 수정할 수 있습니다.</div><button class="complete-btn" onclick="setIndex('${day}',0)">첫 운동 기록 보기</button></div>
    </main>`;
  }
  const ex=list[idx];const te=todayEntry(ex.id,day);const prev=lastBeforeToday(ex.id,day)||(!te?lastEntry(ex.id):null);const d=makeDraft(day,ex);const recBase=te||prev;const status=te?te.status:null;
  const pct=Math.round(count/list.length*100);
  return `<main class="page with-action-dock">
    <div class="progress-row"><span>오늘 ${day}</span><b>${count} / ${list.length} 저장</b></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="exercise-dots">${list.map((x,i)=>`<button class="dot ${i===idx?'current':''} ${todayEntry(x.id,day)?'done':''}" onclick="setIndex('${day}',${i})">${i+1}</button>`).join('')}</div>
    <section class="card ${te?'done':''}">
      <div class="card-head">
        <div class="counter">${idx+1} / ${list.length}</div>
        <div class="title-row"><div class="ex-title">${ex.name}</div><span class="badge">${ex.type==='compound'?'복합':'고립'}</span></div>
        <div class="target">목표 <b>${ex.reps.length}세트 × ${ex.reps[0]}회</b>${ex.note?` · ${ex.note}`:''}</div>
      </div>
      <div class="card-body">
        ${te?`<div class="done-banner">오늘 저장됨 · ${te.weight===0?'체중':te.weight+'kg'} · ${te.reps.join(' / ')} · ${te.status}<br>아래 값을 바꾸고 저장하면 오늘 기록이 수정됩니다.</div>`:''}
        <div class="info-grid">
          <div class="info-box"><div class="info-label">직전 기록</div><div class="info-value">${previousText(prev)}</div></div>
          <div class="info-box"><div class="info-label">다음 권장</div><div class="info-value ${recBase&&recBase.success?'good':'warn'}">${recommendationText(ex,recBase)}</div></div>
        </div>
        <div class="recent-strip"><b>최근 추이</b> · ${recentText(ex.id,3)}</div>
        <div class="section-label">오늘 중량</div>
        ${ex.bodyweight?`<div class="weight-box"><input value="체중" disabled style="font-size:24px"><span>운동</span></div>`:`
        <div class="weight-control">
          <button class="step" onclick="stepWeight('${day}','${ex.id}',-${ex.inc||1})">−</button>
          <div class="weight-box"><input type="number" inputmode="decimal" step="0.25" placeholder="입력" value="${d.weight==null?'':d.weight}" oninput="weightTyping('${day}','${ex.id}',this.value)" onchange="weightChanged('${day}','${ex.id}',this.value)"><span>kg</span></div>
          <button class="step" onclick="stepWeight('${day}','${ex.id}',${ex.inc||1})">+</button>
        </div>
        <div class="helper">± 버튼은 이 운동의 증량 단위 ${ex.inc}kg</div>`}
        <div class="section-label">실제 반복수</div>
        <div class="sets">${ex.reps.map((t,i)=>`<div class="set-row"><div class="set-name">SET ${i+1}<br><span style="font-size:10px">목표 ${t}</span></div><button class="rep-step" onclick="stepRep('${day}','${ex.id}',${i},-1)">−</button><div class="rep-value ${d.reps[i]>t?'above':d.reps[i]<t?'below':''}">${d.reps[i]}</div><button class="rep-step" onclick="stepRep('${day}','${ex.id}',${i},1)">+</button></div>`).join('')}</div>
        <div class="smart-note"><b>자동 준비:</b> ${d.smart||'목표 반복수로 준비됨'}. 목표보다 많이 한 횟수도 정상 기록되며, 중량은 저장 후 자동으로 올라가지 않습니다.</div>
      </div>
    </section>
    <div class="action-dock" role="group" aria-label="운동 기록 조작">
      <div class="action-dock-inner">
        <button class="dock-nav-btn" ${idx===0?'disabled':''} onclick="setIndex('${day}',${idx-1})">이전</button>
        <button class="dock-save-btn ${te?'edit':''}" onclick="saveExercise('${day}','${ex.id}')">${te?'기록 수정':'저장 후 다음'}</button>
        <button class="dock-nav-btn" ${idx===list.length-1?'disabled':''} onclick="setIndex('${day}',${idx+1})">다음</button>
      </div>
    </div>
  </main>`;
}

function uniqueExercises(){const m=new Map();DAYS.forEach(d=>PROGRAM[d].forEach(ex=>{if(!m.has(ex.id))m.set(ex.id,ex)}));return [...m.values()];}
function prEntry(exId){const a=entries(exId).filter(e=>e.success&&e.weight>0);if(!a.length)return null;return a.reduce((b,e)=>e.weight>b.weight?e:b,a[0]);}
function sparkline(values,w=300,h=44){
  if(values.length<2)return '';
  const min=Math.min(...values),max=Math.max(...values),range=max-min||1,step=w/(values.length-1);
  const pts=values.map((v,i)=>`${(i*step).toFixed(1)},${(h-4-((v-min)/range)*(h-8)).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="100%" height="${h}"><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`운동기록_${todayStr()}.json`;a.click();URL.revokeObjectURL(a.href);toast('JSON 백업 생성');
}
function importJSON(input){
  const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result);if(!p.state||!p.history)throw new Error();data=p;data.version=APP_VERSION;saveData();drafts={};toast('백업 복원 완료');render();}catch(e){toast('올바른 백업 파일이 아닙니다');}};r.readAsText(f);input.value='';
}
function resetAll(){if(!confirm('모든 운동 기록과 체중 기록을 삭제할까요?'))return;data=clone(DEFAULT_DATA);drafts={};saveData();toast('전체 초기화 완료');render();}

function renderStats(){
  const latestBW=data.bodyweight.length?data.bodyweight[data.bodyweight.length-1].weight:'';
  const cards=uniqueExercises().map(ex=>{
    const a=entries(ex.id),last=a.length?a[a.length-1]:null,pr=prEntry(ex.id),vals=a.slice(-10).map(e=>e.weight);
    return `<div class="stat-card"><div class="stat-top"><div class="stat-name">${ex.name}</div>${pr?`<div class="stat-pr">최고 성공 ${pr.weight||'BW'}kg</div>`:''}</div>${last?`<div class="stat-current">${last.weight===0?'체중':last.weight}<span>${last.weight===0?'운동 최근':'kg 최근'}</span></div><div class="stat-trail">${fmtDate(last.date)} · ${last.reps.join(' / ')} · ${last.status}</div>${sparkline(vals)}`:`<div class="stat-trail">기록 없음</div>`}</div>`;
  }).join('');
  const bwVals=data.bodyweight.map(x=>x.weight);
  return `<main class="page">
    <div class="section-title">체중 기록</div>
    <div class="manage-card"><div class="bw-row"><input id="bw" type="number" inputmode="decimal" step="0.1" placeholder="${latestBW||'75.0'}"><button class="small-btn primary" onclick="addBodyweight(document.getElementById('bw').value)">저장</button><button class="small-btn" onclick="document.getElementById('bw').value='${latestBW}'">최근</button></div>${bwVals.length>1?sparkline(bwVals):''}<div class="notice">오늘 날짜에 다시 저장하면 기존 체중이 수정됩니다.</div></div>
    <div class="section-title">데이터 관리</div>
    <div class="manage-card"><div class="manage-grid"><button class="small-btn" onclick="exportJSON()">JSON 백업</button><label class="file-label">JSON 복원<input type="file" accept="application/json" onchange="importJSON(this)"></label><button class="small-btn danger" onclick="resetAll()">전체 초기화</button><button class="small-btn" onclick="showDay()">운동 화면</button></div><div class="notice">기록은 이 기기의 브라우저 localStorage에 저장됩니다. 인터넷이 없어도 입력할 수 있습니다. Safari 웹사이트 데이터 또는 홈 화면 앱 데이터를 삭제하면 기록이 사라질 수 있으므로 주기적으로 JSON 백업을 권장합니다.</div></div>
    <div class="section-title">운동별 기록</div>${cards}
  </main>`;
}

function render(){document.getElementById('app').innerHTML=renderTop()+(view==='stats'?renderStats():renderDay());}
function refreshConnectionBadge(){
  const el=document.getElementById('connectionBadge');
  if(!el)return;
  const online=navigator.onLine;
  el.textContent=online?'온라인':'오프라인';
  el.classList.toggle('offline',!online);
}
window.addEventListener('online',()=>{refreshConnectionBadge();toast('온라인 연결');});
window.addEventListener('offline',()=>{refreshConnectionBadge();toast('오프라인 모드');});

if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',async()=>{
    try{
      const reg=await navigator.serviceWorker.register('./service-worker.js',{scope:'./'});
      await navigator.serviceWorker.ready;
      console.log('Service Worker ready',reg.scope);
    }catch(err){console.warn('Service Worker registration failed',err);}
  });
}
render();
</script>
</body>
</html>
