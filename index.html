<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동관리">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<title>운동관리</title>
<style>
:root{--bg:#111318;--surface:#1a1d24;--surface2:#232731;--line:#343946;--text:#f5f6f8;--muted:#969daa;--accent:#4f8edc;--success:#51a766;--warn:#d9a441;--danger:#d66557;--shadow:0 12px 30px rgba(0,0,0,.24)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif}body{min-height:100vh;padding-bottom:calc(24px + env(safe-area-inset-bottom))}button,input{font:inherit}button{touch-action:manipulation}#app{max-width:520px;margin:auto;padding:0 14px}.top{position:sticky;top:0;z-index:20;background:rgba(17,19,24,.96);backdrop-filter:blur(14px);padding-top:calc(10px + env(safe-area-inset-top));border-bottom:1px solid var(--line)}.toprow{display:flex;justify-content:space-between;align-items:center;padding:0 2px 10px}.brand{font-size:13px;font-weight:900;letter-spacing:.05em;color:var(--muted)}.conn{font-size:10px;font-weight:900;color:var(--muted);border:1px solid var(--line);padding:7px 9px;border-radius:999px}.conn.off{color:#f0c46c}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding-bottom:10px}.tab{height:42px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:12px;font-weight:900}.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}.page{padding-top:13px}.summary{display:flex;justify-content:space-between;align-items:center;margin:0 2px 8px;font-size:12px;color:var(--muted)}.summary b{color:var(--text)}.track{height:6px;background:var(--surface2);border-radius:999px;overflow:hidden;margin:0 2px 12px}.fill{height:100%;background:var(--success);transition:.2s}.notice{font-size:11px;color:var(--muted);line-height:1.55;background:rgba(79,142,220,.08);border:1px solid rgba(79,142,220,.3);border-radius:12px;padding:9px 11px;margin-bottom:10px}.exercise-list{display:grid;gap:9px}.exercise{width:100%;display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:11px 12px;color:var(--text);box-shadow:var(--shadow)}.exercise.done{border-color:var(--success);background:rgba(81,167,102,.08)}.num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--muted);font-size:12px;font-weight:900}.done .num{background:rgba(81,167,102,.2);color:#a5e7b3}.ename{font-size:15px;font-weight:900;line-height:1.25}.emeta{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}.estatus{font-size:11px;font-weight:900;color:var(--muted)}.done .estatus{color:#a5e7b3}.session-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.smallbtn{height:46px;border-radius:12px;border:1px solid var(--line);background:var(--surface2);color:var(--text);font-size:12px;font-weight:900}.smallbtn.danger{color:#ffb0a7}.picker{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.picker-title{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px}.picker-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pick{height:42px;border-radius:11px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:900}.pick.active{background:var(--accent);border-color:var(--accent);color:#fff}
.detail{padding-bottom:calc(92px + env(safe-area-inset-bottom))}.backline{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.backbtn{height:38px;padding:0 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:12px;font-weight:900}.counter{font-size:12px;color:var(--muted);font-weight:900}.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.chead{padding:16px;border-bottom:1px solid var(--line)}.title{font-size:22px;font-weight:900;line-height:1.25;letter-spacing:-.03em}.sub{font-size:12px;color:var(--muted);margin-top:7px}.cbody{padding:14px 16px 16px}.info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.ibox{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:68px}.ilabel{font-size:10px;color:var(--muted);font-weight:900;margin-bottom:5px}.ivalue{font-size:13px;font-weight:900;line-height:1.4}.section{font-size:11px;color:var(--muted);font-weight:900;margin:13px 2px 7px}.weight{display:grid;grid-template-columns:52px 1fr 52px;gap:10px;align-items:center}.step{height:50px;border-radius:13px;border:1px solid var(--line);background:var(--surface2);color:var(--text);font-size:25px;font-weight:900}.wbox{height:62px;border-radius:14px;border:1px solid var(--line);background:#15171d;display:flex;align-items:baseline;justify-content:center;gap:5px}.wbox input{width:116px;border:0;outline:0;background:transparent;color:var(--text);font-size:33px;font-weight:900;text-align:center}.wbox span{font-size:13px;color:var(--muted);font-weight:900}.sets{display:grid;gap:8px}.setrow{display:grid;grid-template-columns:64px 46px 1fr 46px;gap:8px;align-items:center;background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:8px}.setname{font-size:12px;color:var(--muted);font-weight:900}.repbtn{height:44px;border-radius:11px;border:1px solid var(--line);background:#181b22;color:var(--text);font-size:20px;font-weight:900}.repval{height:44px;border-radius:11px;background:#15171d;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}.repval.up{color:#8cdda0}.repval.down{color:#f0a191}.live{text-align:center;font-size:12px;font-weight:900;margin-top:10px;color:var(--muted)}.live.hit{color:#8cdda0}.dock{position:fixed;z-index:50;left:50%;bottom:0;transform:translateX(-50%);width:min(520px,100%);padding:8px max(14px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left));background:linear-gradient(to top,rgba(17,19,24,1) 75%,rgba(17,19,24,.92));border-top:1px solid var(--line);backdrop-filter:blur(15px)}.dockinner{display:grid;grid-template-columns:86px 1fr;gap:8px}.dock button{height:54px;border-radius:13px;font-weight:900}.cancel{border:1px solid var(--line);background:var(--surface2);color:var(--text);font-size:12px}.save{border:0;background:var(--accent);color:#fff;font-size:15px}.save.edit{background:var(--success)}
.statcard,.manage{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px;margin-bottom:9px}.sectitle{font-size:12px;color:var(--muted);font-weight:900;margin:18px 2px 8px}.statname{font-size:14px;font-weight:900}.stattrail{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}.statbig{font-size:23px;font-weight:900;margin-top:4px}.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.filelabel{height:44px;border:1px solid var(--line);border-radius:11px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}.filelabel input{display:none}.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#f5f6f8;color:#17191f;border-radius:999px;padding:10px 15px;font-size:12px;font-weight:900;opacity:0;z-index:99;pointer-events:none;transition:.2s}.toast.show{opacity:1;bottom:calc(96px + env(safe-area-inset-bottom))}
</style>
</head>
<body><div id="app"></div><div id="toast" class="toast"></div>
<script>
const VERSION='4.0-flexible-order';
const KEY='jeremy_workout_v4';
const LEGACY=['jeremy_workout_v3','jeremy_workout_v2'];
const DAYS=['PUSH','PULL','LEGS'];
const PROGRAM={
PUSH:[
{id:'db_chest_press',name:'덤벨 체스트프레스',sets:3,reps:8,inc:2.5,note:'한 손 기준'},
{id:'incline_db_press',name:'인클라인 덤벨프레스',sets:3,reps:10,inc:2.5,note:'한 손 기준'},
{id:'cable_cross',name:'케이블 크로스',sets:4,reps:12,inc:2.5},
{id:'machine_shoulder_press',name:'머신 숄더프레스',sets:3,reps:8,inc:2.5},
{id:'db_lateral_raise',name:'덤벨 사이드 레터럴 레이즈',sets:3,reps:15,inc:1,note:'한 손 기준'},
{id:'cable_lateral_raise',name:'케이블 레터럴 레이즈',sets:3,reps:12,inc:1},
{id:'onearm_oh_db_ext',name:'원암 오버헤드 덤벨 익스텐션',sets:3,reps:10,inc:1,note:'한 손 기준'},
{id:'rope_pushdown',name:'로프 푸시다운',sets:3,reps:10,inc:2.5}
],
PULL:[
{id:'latpulldown',name:'랫풀다운',sets:3,reps:8,inc:2.5},
{id:'straight_arm_pulldown',name:'스트레이트 암 풀다운',sets:3,reps:10,inc:2.5},
{id:'onearm_cable_highrow',name:'원암 케이블 하이로우',sets:3,reps:8,inc:2.5,note:'한쪽씩'},
{id:'onearm_db_row',name:'원암 덤벨 로우',sets:3,reps:8,inc:2.5,note:'한 손 기준'},
{id:'cable_shrug',name:'케이블 슈러그',sets:3,reps:10,inc:2.5},
{id:'reverse_pecdeck',name:'리버스 펙덱',sets:3,reps:12,inc:2.5},
{id:'standing_barbell_curl',name:'스탠딩 바벨컬',sets:3,reps:10,inc:2.5},
{id:'incline_db_curl',name:'인클라인 덤벨컬',sets:3,reps:10,inc:1,note:'한 손 기준'}
],
LEGS:[
{id:'leg_extension',name:'레그 익스텐션',sets:3,reps:12,inc:2.5},
{id:'lying_leg_curl',name:'라잉 레그컬',sets:3,reps:10,inc:2.5},
{id:'squat_choice',name:'스쿼트 운동',sets:3,reps:10,inc:2.5,choice:true},
{id:'stiff_deadlift',name:'스티프 데드리프트',sets:3,reps:10,inc:2.5},
{id:'bulgarian_split',name:'불가리안 스플릿스쿼트',sets:3,reps:10,inc:1,note:'한쪽씩 · 덤벨 한 손 기준'},
{id:'hip_abduction',name:'힙 어브덕션',sets:3,reps:15,inc:2.5},
{id:'hip_thrust',name:'힙 쓰러스트',sets:3,reps:10,inc:2.5},
{id:'calf_raise',name:'카프레이즈',sets:3,reps:15,inc:5}
]};
const SQUATS={hack:{id:'hack_squat',name:'핵스쿼트',sets:4,reps:8,inc:2.5},smith:{id:'smith_squat_glute',name:'스미스 스쿼트(둔근)',sets:3,reps:10,inc:2.5}};
const DEFAULT={version:VERSION,state:{lastDay:'PUSH',weights:{},squatChoiceByDate:{}},history:{},bodyweight:[]};
let data=load();let view='list';let detail=null;let draft=null;
function clone(v){return JSON.parse(JSON.stringify(v))}function today(){const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10)}function fmt(d){if(!d)return'';const p=d.split('-');return `${+p[1]}/${+p[2]}`}function round(v){return Math.round(Number(v)*4)/4}function storageGet(k){try{return localStorage.getItem(k)}catch(e){return null}}function storageSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function load(){try{let raw=storageGet(KEY);if(!raw){for(const k of LEGACY){raw=storageGet(k);if(raw)break}}if(!raw)return clone(DEFAULT);const p=JSON.parse(raw);return{version:VERSION,state:Object.assign(clone(DEFAULT.state),p.state||{}),history:p.history||{},bodyweight:p.bodyweight||[]}}catch(e){return clone(DEFAULT)}}function save(){storageSet(KEY,JSON.stringify(data))}function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),1400)}
function currentSquatChoice(){return data.state.squatChoiceByDate[today()]||'hack'}function setSquatChoice(v){data.state.squatChoiceByDate[today()]=v;save();render()}function actualExercise(ex){return ex.choice?SQUATS[currentSquatChoice()]:ex}function listFor(day){return PROGRAM[day].map(actualExercise)}function entries(id){return data.history[id]||[]}function last(id){const a=entries(id);return a.length?a[a.length-1]:null}function todayEntry(id,day){return [...entries(id)].reverse().find(e=>e.date===today()&&e.day===day)||null}function doneCount(day){return listFor(day).filter(ex=>todayEntry(ex.id,day)).length}function success(ex,reps){return reps.every(r=>Number(r)>=ex.reps)}function recommended(ex){const l=last(ex.id);if(!l)return null;return l.success?round(l.weight+ex.inc):l.weight}
function openExercise(index){const day=data.state.lastDay;const ex=listFor(day)[index];const te=todayEntry(ex.id,day);const le=last(ex.id);const weight=te?te.weight:(data.state.weights[ex.id]??(le?le.weight:''));const reps=te?te.reps.slice():Array(ex.sets).fill(ex.reps);detail={day,index,ex};draft={weight,reps};view='detail';render()}function changeWeight(delta){const cur=draft.weight===''?0:Number(draft.weight);draft.weight=Math.max(0,round(cur+delta));render()}function inputWeight(v){draft.weight=v===''?'':Number(v)}function rep(i,d){draft.reps[i]=Math.max(0,draft.reps[i]+d);render()}
function saveExercise(){const {day,ex}=detail;if(!ex.bodyweight&&(draft.weight===''||Number(draft.weight)<=0)){toast('중량을 입력하세요');return}const ent={date:today(),day,weight:Number(draft.weight)||0,reps:draft.reps.slice(),success:success(ex,draft.reps),version:VERSION};if(!data.history[ex.id])data.history[ex.id]=[];const arr=data.history[ex.id];const idx=arr.findIndex(e=>e.date===ent.date&&e.day===day);if(idx>=0)arr[idx]=ent;else arr.push(ent);data.state.weights[ex.id]=ent.weight;save();view='list';detail=null;draft=null;toast('기록 저장');render()}
function selectDay(d){data.state.lastDay=d;save();view='list';detail=null;render()}function resetToday(){const d=data.state.lastDay;if(!confirm('오늘 '+d+' 기록을 모두 삭제할까요?'))return;for(const ex of listFor(d)){if(data.history[ex.id])data.history[ex.id]=data.history[ex.id].filter(e=>!(e.date===today()&&e.day===d))}save();render()}function exportJSON(){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`운동기록_${today()}.json`;a.click();URL.revokeObjectURL(u)}function restore(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();render();toast('복원 완료')}catch(e){toast('파일 오류')}};r.readAsText(f);input.value=''}
function renderTop(){return `<div class="top"><div class="toprow"><div class="brand">운동관리 · 자유 순서</div><div id="conn" class="conn ${navigator.onLine?'':'off'}">${navigator.onLine?'온라인':'오프라인'}</div></div><div class="tabs">${DAYS.map(d=>`<button class="tab ${view!=='stats'&&data.state.lastDay===d?'active':''}" onclick="selectDay('${d}')">${d}</button>`).join('')}<button class="tab ${view==='stats'?'active':''}" onclick="view='stats';render()">통계</button></div></div>`}
function renderList(){const d=data.state.lastDay,l=listFor(d),done=doneCount(d);return `<main class="page"><div class="summary"><span>오늘 진행</span><b>${done} / ${l.length}</b></div><div class="track"><div class="fill" style="width:${done/l.length*100}%"></div></div><div class="notice">기구가 비어 있는 운동부터 누르세요. 저장하면 목록으로 돌아오며 완료된 운동만 체크됩니다.</div>${d==='LEGS'?`<div class="picker"><div class="picker-title">오늘 스쿼트 선택</div><div class="picker-row"><button class="pick ${currentSquatChoice()==='hack'?'active':''}" onclick="setSquatChoice('hack')">핵스쿼트 4×8</button><button class="pick ${currentSquatChoice()==='smith'?'active':''}" onclick="setSquatChoice('smith')">스미스(둔근) 3×10</button></div></div>`:''}<div class="exercise-list">${l.map((ex,i)=>{const t=todayEntry(ex.id,d),le=last(ex.id);return `<button class="exercise ${t?'done':''}" onclick="openExercise(${i})"><span class="num">${t?'✓':i+1}</span><span><span class="ename">${ex.name}</span><span class="emeta">목표 ${ex.sets}×${ex.reps}${le?` · 직전 ${le.weight}kg ${le.reps.join('/')}`:' · 기록 없음'}</span></span><span class="estatus">${t?`${t.weight}kg`:'선택'}</span></button>`}).join('')}</div><div class="session-actions"><button class="smallbtn danger" onclick="resetToday()">오늘 기록 초기화</button><button class="smallbtn" onclick="view='stats';render()">기록·백업</button></div></main>`}
function renderDetail(){const {day,index,ex}=detail,te=todayEntry(ex.id,day),le=last(ex.id),rec=recommended(ex),hit=success(ex,draft.reps);return `<main class="page detail"><div class="backline"><button class="backbtn" onclick="view='list';detail=null;render()">← 운동 목록</button><span class="counter">${index+1} / ${listFor(day).length}</span></div><section class="card"><div class="chead"><div class="title">${ex.name}</div><div class="sub">목표 ${ex.sets}세트 × ${ex.reps}회${ex.note?' · '+ex.note:''}</div></div><div class="cbody"><div class="info"><div class="ibox"><div class="ilabel">직전 기록</div><div class="ivalue">${le?`${fmt(le.date)} · ${le.weight}kg<br>${le.reps.join(' / ')}`:'기록 없음'}</div></div><div class="ibox"><div class="ilabel">다음 권장</div><div class="ivalue">${rec!=null?rec+'kg':'첫 기록 후 표시'}</div></div></div><div class="section">오늘 중량</div><div class="weight"><button class="step" onclick="changeWeight(-${ex.inc})">−</button><div class="wbox"><input type="number" step="0.25" value="${draft.weight}" placeholder="입력" oninput="inputWeight(this.value)"><span>kg</span></div><button class="step" onclick="changeWeight(${ex.inc})">+</button></div><div class="section">실제 반복수</div><div class="sets">${draft.reps.map((r,i)=>`<div class="setrow"><div class="setname">SET ${i+1}</div><button class="repbtn" onclick="rep(${i},-1)">−</button><div class="repval ${r>ex.reps?'up':r<ex.reps?'down':''}">${r}</div><button class="repbtn" onclick="rep(${i},1)">+</button></div>`).join('')}</div><div class="live ${hit?'hit':''}">${draft.reps.join(' / ')} · ${hit?'목표 달성':'동일 중량 유지'}</div></div></section><div class="dock"><div class="dockinner"><button class="cancel" onclick="view='list';detail=null;render()">목록</button><button class="save ${te?'edit':''}" onclick="saveExercise()">${te?'기록 수정':'저장하고 목록으로'}</button></div></div></main>`}
function renderStats(){const all=[...PROGRAM.PUSH,...PROGRAM.PULL,...PROGRAM.LEGS.filter(x=>!x.choice),...Object.values(SQUATS)],seen=new Set(),cards=[];for(const ex of all){if(seen.has(ex.id))continue;seen.add(ex.id);const a=entries(ex.id),le=a.length?a[a.length-1]:null,best=a.filter(e=>e.success).sort((x,y)=>y.weight-x.weight)[0];cards.push(`<div class="statcard"><div class="statname">${ex.name}</div><div class="statbig">${le?le.weight+'kg':'—'}</div><div class="stattrail">${best?'최고 성공 '+best.weight+'kg':'성공 기록 없음'}${a.length?'<br>최근 '+a.slice(-5).map(e=>e.weight+'kg '+e.reps.join('/')).join(' · '):''}</div></div>`)}return `<main class="page"><div class="sectitle">데이터 관리</div><div class="manage"><div class="tools"><button class="smallbtn" onclick="exportJSON()">JSON 백업</button><label class="filelabel">JSON 복원<input type="file" accept="application/json" onchange="restore(this)"></label></div><div class="stattrail">기록은 이 아이폰의 브라우저 저장소에 보관됩니다. 정기적으로 백업하세요.</div></div><div class="sectitle">운동별 기록</div>${cards.join('')}</main>`}
function render(){document.getElementById('app').innerHTML=renderTop()+(view==='detail'?renderDetail():view==='stats'?renderStats():renderList())}window.addEventListener('online',render);window.addEventListener('offline',render);if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js'));render();
</script></body></html>
